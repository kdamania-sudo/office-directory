<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>48 Village Centre Place - Office Directory</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="screen">


<!-- HEADER -->
<div class="header">

<div class="clock-box">

    <div id="clock"></div>
    <div id="date"></div>

</div>



<!-- CENTER LOGO -->
<div class="brand">

<svg viewBox="0 0 100 70" xmlns="http://www.w3.org/2000/svg">

    <rect x="24" y="18" width="16" height="46" fill="#4f8dff"/>
    <rect x="42" y="26" width="14" height="38" fill="#ffffff"/>
    <rect x="58" y="6" width="18" height="58" fill="#2f6fed"/>
    <rect x="78" y="22" width="14" height="42" fill="#ffffff"/>
    <path d="M4 66 Q50 50 96 66"
    stroke="#4f8dff"
    stroke-width="3"
    fill="none"/>
</svg>


<h1>
48 VILLAGE CENTRE PLACE
</h1>


<div class="sub">

<span class="rule"></span>

<span class="label">
OFFICE DIRECTORY
</span>

</div>



<!-- WEATHER RIGHT -->

<div id="weather-icon"></div>

<div id="temperature"></div>

<div id="location"></div>

<div id="condition"></div>


</div>


</div>




<!-- DIRECTORY -->

<div id="directory"></div>




<!-- FOOTER -->

<div class="banner">

<span class="banner-text">
WELCOME TO 48 VILLAGE CENTRE PLACE
</span>
