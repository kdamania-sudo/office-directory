<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>48 Village Centre Place — Office Directory</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="screen">

  <div class="header">
    <div>
      <div class="clock-block">
        <span class="time" id="time">--:--</span>
        <span class="ampm" id="ampm">--</span>
      </div>
      <div class="date-line" id="date">Loading date…</div>
    </div>

    <div class="brand">
      <svg viewBox="0 0 100 70" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="30" width="14" height="34" fill="#ffffff"/>
        <rect x="24" y="18" width="16" height="46" fill="#4f8dff"/>
        <rect x="42" y="26" width="14" height="38" fill="#ffffff"/>
        <rect x="58" y="6" width="18" height="58" fill="#2f6fed"/>
        <rect x="78" y="22" width="14" height="42" fill="#ffffff"/>
        <path d="M4 66 Q50 50 96 66" stroke="#4f8dff" stroke-width="3" fill="none"/>
      </svg>
      <h1>48 VILLAGE CENTRE PLACE</h1>
      <div class="sub">
        <span class="rule"></span>
        <span class="label">OFFICE DIRECTORY</span>
        <span class="rule right"></span>
      </div>
    </div>

    <div class="weather-block">
      <svg class="weather-icon" id="weatherIcon" viewBox="0 0 64 64"></svg>
      <div class="weather-text">
        <div class="weather-temp"><span id="temp">--</span>&nbsp;°C</div>
        <div class="weather-desc" id="weatherDesc">Fetching weather…</div>
        <div class="weather-city" id="cityLabel">Mississauga, ON</div>
      </div>
    </div>
  </div>

  <div id="directory"></div>

  <div class="banner">
    <span class="banner-text">Welcome to 48 Village Centre Place</span>
  </div>

</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
